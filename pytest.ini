[pytest]
# ── Test discovery ────────────────────────────────────────────────────────────
testpaths   = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output verbosity ──────────────────────────────────────────────────────────
addopts =
    --verbose
    --tb=short
    --strict-markers
    --html=reports/report.html
    --self-contained-html

# ── Custom markers ────────────────────────────────────────────────────────────
markers =
    smoke:       Quick, critical-path tests (run on every CI push)
    regression:  Full regression suite
    negative:    Negative / edge-case tests
    slow:        Tests that are intentionally slow or require extra resources

# ── Logging ───────────────────────────────────────────────────────────────────
log_cli         = true
log_cli_level   = INFO
log_cli_format  = %(asctime)s | %(levelname)-8s | %(name)s - %(message)s
log_cli_date_format = %H:%M:%S
log_file        = reports/pytest.log
log_file_level  = DEBUG
log_file_format = %(asctime)s | %(levelname)-8s | %(name)s - %(message)s
